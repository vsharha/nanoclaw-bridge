services:
  llm-proxy:
    container_name: llm-proxy
    build: ./llm-proxy
    env_file: .env
    networks:
      - nanoclaw-net
    restart: unless-stopped

  nanoclaw:
    container_name: nanoclaw
    build: ./nanoclaw
    env_file: .env
    environment:
      CREDENTIAL_PROXY_HOST: "0.0.0.0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${NANOCLAW_DATA_DIR:-/var/lib/nanoclaw}:${NANOCLAW_DATA_DIR:-/var/lib/nanoclaw}
      # When NANOCLAW_AGENT_HOME=/home/youruser, add: - /home/youruser:/home/youruser:ro
      - nanoclaw-config:/root/.config/nanoclaw
    ports:
      - "3001:3001"
    depends_on:
      - llm-proxy
    networks:
      - nanoclaw-net
    restart: unless-stopped

volumes:
  nanoclaw-config:

networks:
  nanoclaw-net:
    driver: bridge
