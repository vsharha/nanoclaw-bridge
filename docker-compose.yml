services:
  llm-proxy:
    build: ./llm-proxy
    env_file: .env
    networks:
      - nanoclaw-net
    restart: unless-stopped

  nanoclaw:
    build: ./nanoclaw
    env_file: .env
    environment:
      CREDENTIAL_PROXY_HOST: "0.0.0.0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - nanoclaw-code:/workspace
      - nanoclaw-config:/root/.config/nanoclaw
    ports:
      - "3001:3001"
    depends_on:
      - llm-proxy
    networks:
      - nanoclaw-net
    restart: unless-stopped

volumes:
  nanoclaw-code:
  nanoclaw-config:

networks:
  nanoclaw-net:
    driver: bridge
